server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;



    # Frontend React/Vite
    location / {
        proxy_pass http://frontend:5173/;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

	# Dashboard
    location = /dashboard {
        try_files /index.html =404;
    }

    # Backend
	location /api/ {
		proxy_pass http://backend:3000/;  # Proxy vers le backend sans préfixe
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# 🚀 WebSocket Échecs
    location /ws {
        proxy_pass http://backend:3000/ws; # Transmet directement la route /ws au serveur Node
        proxy_http_version 1.1;
        
        # Gestion des en-têtes d'upgrade indispensables pour les WebSockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Envoi des informations d'origine au backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Augmentation des timeouts pour éviter que Nginx ne coupe la connexion 
        # si un joueur réfléchit trop longtemps à son coup (10 minutes)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # pgAdmin
	location /pgadmin/ {
		set $upstream_pgadmin http://pgadmin:80;

		proxy_pass $upstream_pgadmin;

		resolver 127.0.0.11 valid=30s;

		proxy_http_version 1.1;

		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		proxy_set_header X-Script-Name /pgadmin;
		proxy_set_header X-Scheme $scheme;

		proxy_redirect off;

		proxy_read_timeout 60s;
		proxy_send_timeout 60s;
	}

    # Portainer
	location /portainer/ {
		rewrite ^/portainer/(.*) /$1 break;
		proxy_pass http://portainer:9000/;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_redirect off;
	}

     # IA Maison (FastAPI)
    location /ai/ {
        proxy_pass http://ai:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}