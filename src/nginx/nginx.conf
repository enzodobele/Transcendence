merge_slashes on;

server {
    listen 8443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Autorise l'upload d'avatars (limite multer : 2MB) avec un peu de marge
    client_max_body_size 3M;

    # ModSecurity WAF + OWASP CRS are enabled globally by the CRS base image
    # (http-level conf.d/modsecurity.conf); engine mode comes from the
    # MODSEC_RULE_ENGINE env var. Locations below opt out with `modsecurity off`.

    root /usr/share/nginx/html;
    index index.html;

    # Frontend React/Vite
    location / {
        proxy_pass http://frontend:5173/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Dashboard
    location = /dashboard {
        try_files /index.html =404;
    }

    # STATUS & HEALTHCHECK
    location /api/status/ {
        proxy_pass http://backend-status:3004/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /backup-status.json {
        add_header Cache-Control "no-store";
        try_files /backup-status.json =404;
    }

    # MONITORING (Prometheus + Grafana via HTTPS)
    
    location = /monitoring/grafana {
        return 301 /monitoring/grafana/;
    }

    location /monitoring/grafana/ {
        proxy_pass http://monitoring-grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /monitoring/prometheus {
        return 301 /monitoring/prometheus/;
    }

    location /monitoring/prometheus/ {
        rewrite ^/monitoring/prometheus/?(.*)$ /$1 break;
        proxy_pass http://monitoring-prometheus:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MICROSERVICE : Auth (Inscription / Connexion / Profils)
    location /api/auth/ {
        # Transforme /api/auth/login en /auth/login pour l'Express de l'auth
        rewrite ^/api/auth/(.*) /auth/$1 break;
        proxy_pass http://backend-auth:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MICROSERVICE : Matchmaking (Gestion du lobby)
    location /api/lobby/join {
        rewrite ^/api/lobby/join(.*) /matchmaking/join break;
        proxy_pass http://backend-matchmaking:3001;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/lobby/leave {
        rewrite ^/api/lobby/leave(.*) /matchmaking/leave break;
        proxy_pass http://backend-matchmaking:3001;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MICROSERVICE : Friends (Gestion des amis)
    location /api/friends {
        rewrite ^/api/friends(.*) /friends$1 break;
        proxy_pass http://backend-friends:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MICROSERVICE : Game Engine (Le reste de l'API)
    location /api/ {
        proxy_pass http://backend-game:3002/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket Echecs (Lié directement au Game Engine)
    location /ws {
        modsecurity off;
        proxy_pass http://backend-game:3002/ws;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

     location /ai/ {
        proxy_pass http://ai:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host ai:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}