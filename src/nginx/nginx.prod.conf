merge_slashes on;

server {
    listen 8443 ssl;
    server_name localhost; # En vraie prod, remplace par ton domaine

    # 🔒 Configuration SSL de Production (À pointer vers tes vrais certificats Certbot / Let's Encrypt)
    ssl_certificate     /etc/nginx/ssl/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Autorise l'upload d'avatars (limite multer : 2MB) avec un peu de marge
    client_max_body_size 3M;

    # ModSecurity WAF + OWASP CRS are enabled globally by the CRS base image
    # (http-level conf.d/modsecurity.conf); engine mode comes from the
    # MODSEC_RULE_ENGINE env var. Locations below opt out with `modsecurity off`.

    # 🖥️ ROUTE 1 : Le Frontend Statique React
    location / {
        proxy_pass http://frontend:5173/; 
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🩺 ROUTE 2 : Status & Healthcheck (Observabilité)
    location = /api/status/health {
        proxy_pass http://backend-auth:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/status/ws {
        proxy_pass http://backend-game:3002/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /backup-status.json {
        add_header Cache-Control "no-store";
        default_type application/json;
        alias /usr/share/nginx/html/backup-status.json;
    }

    # 🔐 ROUTE 3 : Microservice Auth

    location /api/auth/ {
        rewrite ^/api/auth/(.*) /auth/$1 break;
        proxy_pass http://backend-auth:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🚀 ROUTE 4 : Microservice Matchmaking (Lobby)
    location /api/lobby/join {
        rewrite ^/api/lobby/join(.*) /matchmaking/join break;
        proxy_pass http://backend-matchmaking:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/lobby/leave {
        rewrite ^/api/lobby/leave(.*) /matchmaking/leave break;
        proxy_pass http://backend-matchmaking:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ♟️ ROUTE 5 : Game Engine (API)
    location /api/ {
        # Attention au nom du conteneur, on utilise "backend-game" ou ton alias compose
        proxy_pass http://backend-game:3002/;  
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🔌 ROUTE 6 : WebSockets Échecs (Game Engine)
    location /ws {
        modsecurity off;
        proxy_pass http://backend-game:3002/ws;
        proxy_http_version 1.1;
        
        # Obligatoire pour maintenir la connexion WebSocket ouverte
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 🧠 ROUTE 7 : IA (Stockfish service s'il existe toujours en prod)
    location /ai/ {
        proxy_pass http://ai:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}