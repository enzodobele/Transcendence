# CRS exclusions tuned for ChessGuard routes.
# This file replaces the empty REQUEST-900 exclusion slot in the CRS
# include chain, so it loads before the CRS rules.

# Avatar uploads: multipart image bodies trip strict multipart validation.
# Scope: auth routes only. Custom rule ids live in the 1000-1999 range.
SecRule REQUEST_URI "@beginsWith /api/auth/" \
    "id:1001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=200003"
