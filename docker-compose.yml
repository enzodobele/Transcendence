name: chessguard_dev

services:
  # =============================================
  # 🖥️ FRONTEND (React + Vite + Nginx)
  # =============================================
  frontend:
    build: ./src/frontend
    container_name: frontend
    expose:
      - "5173"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    networks:
      - chessguard_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # =============================================
  # 🌐 NGINX (Reverse Proxy)
  # =============================================
  nginx:
    build: ./src/nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - ./src/nginx/html:/usr/share/nginx/html
    depends_on:
      frontend:
        condition: service_healthy
      db:
        condition: service_healthy
      ai:
        condition: service_healthy
      backend-game:
        condition: service_healthy
      backend-auth:
        condition: service_healthy
      backend-matchmaking:
        condition: service_healthy
      backend-friends:
        condition: service_healthy
    networks:
      - chessguard_network
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1:443"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # =========================================================================
  # 🔐 MICROSERVICE AUTH (Gère l'inscription, connexion, profils)
  # =========================================================================
  backend-auth:
    build: ./src/backend-auth
    container_name: backend-auth
    volumes:
      - ./src/backend-auth:/app
      - /app/node_modules
      - avatar_uploads:/app/uploads
    environment:
      DB_USER_FILE: /run/secrets/db_user
      DB_NAME_FILE: /run/secrets/db_name
      DB_PASSWORD_FILE: /run/secrets/db_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      PORT: 3000
    secrets:
      - db_password
      - db_user
      - db_name
      - jwt_secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chessguard_network
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  # =========================================================================
  # 👥 MICROSERVICE FRIENDS (Gestion des amis)
  # =========================================================================
  backend-friends:
    build: ./src/backend-friends
    container_name: backend-friends
    volumes:
      - ./src/backend-friends:/app
      - /app/node_modules
    environment:
      PORT: 3003
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      DB_USER_FILE: /run/secrets/db_user
      DB_NAME_FILE: /run/secrets/db_name
      DB_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
      - db_user
      - db_name
      - jwt_secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chessguard_network
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  # =========================================================================
  # ♟️ GAME ENGINE (Ancien gros backend épuré - Sockets & Validations)
  # =========================================================================
  backend-game:
    build: ./src/backend-game
    container_name: backend-game
    volumes:
      - ./src/backend-game:/app
      - /app/node_modules
    environment:
      DB_USER_FILE: /run/secrets/db_user
      DB_NAME_FILE: /run/secrets/db_name
      DB_PASSWORD_FILE: /run/secrets/db_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      PORT: 3002
    secrets:
      - db_password
      - db_user
      - db_name
      - jwt_secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chessguard_network
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  # =============================================
  # 🚀 MATCHMAKING MICROSERVICE (Node + Express + Prisma)
  # =============================================
  backend-matchmaking:
    build: ./src/backend-matchmaking
    container_name: backend-matchmaking
    volumes:
      - ./src/backend-matchmaking:/app
      - /app/node_modules
    environment:
      DB_USER_FILE: /run/secrets/db_user
      DB_NAME_FILE: /run/secrets/db_name
      DB_PASSWORD_FILE: /run/secrets/db_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      GAME_SERVICE_URL: http://backend-game:3002
    secrets:
      - db_password
      - db_user
      - db_name
      - jwt_secret
    depends_on:
      db:
        condition: service_healthy
      backend-game:
        condition: service_healthy
    networks:
      - chessguard_network
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  # =============================================
  # 🤖 IA MAISON (FastAPI + PyTorch)
  # =============================================
  ai:
    build: ./src/ai
    container_name: ai
    expose:
      - "8000"
    volumes:
      - ./src/ai:/app
    networks:
      - chessguard_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # =============================================
  # 🗃️ DATABASE (PostgreSQL)
  # =============================================
  db:
    image: postgres:16
    container_name: chessguard-db
    expose:
      - "5432"
    environment:
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
      - db_user
      - db_name
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat $$POSTGRES_USER_FILE) -d $$(cat $$POSTGRES_DB_FILE)"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - chessguard_network
    restart: unless-stopped

  # =============================================
  # 🔧 OUTILS (Optionnels)
  # =============================================
  portainer:
    image: portainer/portainer-ce:2.39.1
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    secrets:
      - portainer_password

    command: --admin-password-file=/run/secrets/portainer_password
    networks:
      - chessguard_network
    restart: unless-stopped

  pgadmin:
    build: ./src/pgadmin
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "True"
    volumes:
      - ./src/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - chessguard_network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    environment:
      MP_BASE_URL: /mailpit
    ports:
      - "8025:8025"
    networks:
      - chessguard_network
    restart: unless-stopped

# =============================================
# 💾 VOLUMES
# =============================================
volumes:
  postgres_data:
  portainer_data:
  avatar_uploads:

# =============================================
# 🌐 NETWORK
# =============================================
networks:
  chessguard_network:
    name: chessguard_network
    driver: bridge

# =============================================
# 🔐 SECRETS
# =============================================
secrets:
  db_user:
    file: src/secrets/db_user.txt
  db_name:
    file: src/secrets/db_name.txt
  db_password:
    file: src/secrets/db_password.txt
  portainer_password:
    file: src/secrets/portainer_password.txt
  jwt_secret:
    file: src/secrets/jwt_secret.txt