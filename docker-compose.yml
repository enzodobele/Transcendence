services:
  # =============================================
  # 🖥️ FRONTEND (React + Vite + Nginx)
  # =============================================
  frontend:
    build: ./src/frontend
    container_name: frontend
    user: "1001:1001" 
    expose:
      - "5173"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    networks:
      - chessguard_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    build: ./src/nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - ./src/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - chessguard_network
    restart: unless-stopped

  # =============================================
  # 📦 BACKEND (Node + Express + Prisma)
  # =============================================
  backend:
    build: ./src/backend
    container_name: backend
    user: "1001:1001" 
    expose:
      - "3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/chessguard
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chessguard_network
    restart: unless-stopped

  # =============================================
  # 🗃️ DATABASE (PostgreSQL)
  # =============================================
  db:
    image: postgres:15
    container_name: chessguard-db
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-chessguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chessguard_network
    restart: unless-stopped

  # =============================================
  # 🔧 OUTILS (Optionnels)
  # =============================================
  portainer:
    image: portainer/portainer-ce:2.39.1
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - chessguard_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: chessguard-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@chessguard.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
      # Optionnel : Associe le mot de passe à l'utilisateur de la DB pour l'auto-connexion
      PGADMIN_CONFIG_SERVER_MODE: "True"
    volumes:
      # Injecte la configuration des serveurs au lancement
      - ./src/pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "127.0.0.1:5050:80"
    networks:
      - chessguard_network
    depends_on:
      db:
        condition: service_healthy

# =============================================
# 💾 VOLUMES
# =============================================
volumes:
  postgres_data:
  portainer_data:

# =============================================
# 🌐 NETWORK
# =============================================
networks:
  chessguard_network:
    name: chessguard_network
    driver: bridge