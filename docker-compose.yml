name: chessguard_dev

services:
  # FRONTEND (React + Vite + Nginx)
  frontend:
    build: ./src/frontend
    container_name: frontend
    expose:
      - "5173"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    networks:
      - chessguard_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # NGINX (Reverse Proxy)
  nginx:
    build: ./src/nginx
    container_name: nginx
    ports:
      # Host 443 -> container 8443 (nginx runs non-root on an unprivileged port).
      - "8443:8443"
    environment:
      # DetectionOnly in dev: log would-be blocks without breaking the workflow.
      MODSEC_RULE_ENGINE: DetectionOnly
      BLOCKING_PARANOIA: "1"
      MODSEC_AUDIT_LOG: /var/log/modsecurity/audit.log
    volumes:
      - ./src/nginx/html:/usr/share/nginx/html:z
      - waf_logs:/var/log/modsecurity
    depends_on:
      frontend:
        condition: service_healthy
      chessguard-db:
        condition: service_healthy
      ai:
        condition: service_healthy
      backend-game:
        condition: service_healthy
      backend-auth:
        condition: service_healthy
      backend-matchmaking:
        condition: service_healthy
      backend-friends:
        condition: service_healthy
      backend-status:
        condition: service_healthy
    networks:
      - chessguard_network
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1:8443"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # MICROSERVICE AUTH (Gère l'inscription, connexion, profils)
  backend-auth:
    build: ./src/backend-auth
    container_name: backend-auth
    volumes:
      - ./src/backend-auth:/app
      - /app/node_modules
      - avatar_uploads:/app/uploads
      - vault_creds_auth:/vault/creds:ro
    environment:
      VAULT_ADDR: http://vault:8200
      PORT: 3000
    depends_on:
      chessguard-db:
        condition: service_healthy
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_network
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  # MICROSERVICE FRIENDS (Gestion des amis)
  backend-friends:
    build: ./src/backend-friends
    container_name: backend-friends
    volumes:
      - ./src/backend-friends:/app
      - /app/node_modules
      - vault_creds_friends:/vault/creds:ro
    environment:
      PORT: 3003
      VAULT_ADDR: http://vault:8200
    depends_on:
      chessguard-db:
        condition: service_healthy
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_network
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  # GAME ENGINE (Ancien gros backend épuré - Sockets & Validations)
  backend-game:
    build: ./src/backend-game
    container_name: backend-game
    volumes:
      - ./src/backend-game:/app
      - /app/node_modules
      - vault_creds_game:/vault/creds:ro
    environment:
      VAULT_ADDR: http://vault:8200
      PORT: 3002
    depends_on:
      chessguard-db:
        condition: service_healthy
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_network
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

# MATCHMAKING MICROSERVICE (Node + Express + Prisma)
  backend-matchmaking:
    build: ./src/backend-matchmaking
    container_name: backend-matchmaking
    volumes:
      - ./src/backend-matchmaking:/app
      - /app/node_modules
      - vault_creds_matchmaking:/vault/creds:ro
    environment:
      VAULT_ADDR: http://vault:8200
      GAME_SERVICE_URL: http://backend-game:3002
    depends_on:
      chessguard-db:
        condition: service_healthy
      backend-game:
        condition: service_healthy
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_network
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  # MICROSERVICE STATUS (Health aggregator + Backup cron)
  backend-status:
    build: ./src/backend-status
    container_name: backend-status
    user: "nodejs"
    volumes:
      - ./src/backend-status:/app
      - /app/node_modules
      - backups_data:/backups
      - vault_creds_status:/vault/creds:ro
    environment:
      VAULT_ADDR: http://vault:8200
      PORT: 3004
    depends_on:
      chessguard-db:
        condition: service_healthy
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_network
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  # IA MAISON (FastAPI + PyTorch)
  ai:
    build: ./src/ai
    container_name: ai
    expose:
      - "8000"
    volumes:
      - ./src/ai:/app
    networks:
      - chessguard_network
    healthcheck:
      test: ["CMD", "python", "-m", "urllib.request", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # VAULT (secrets management)
  vault:
    image: docker.io/hashicorp/vault:1.20
    container_name: vault
    command: ["vault", "server", "-config=/vault/config/vault.hcl"]
    environment:
      SKIP_SETCAP: "true"
      # CLI/healthcheck target inside the container (listener is TLS-disabled).
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "127.0.0.1:8200:8200"  # local-only: Vault UI for demos
    volumes:
      - ./src/vault/vault.hcl:/vault/config/vault.hcl:ro,z
      - vault_data:/vault/file
    networks:
      - chessguard_network
    healthcheck:
      # vault status exits 0 unsealed, 2 sealed: both mean "server up".
      test: ["CMD-SHELL", "vault status >/dev/null 2>&1; rc=$$?; [ $$rc -eq 0 ] || [ $$rc -eq 2 ]"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  vault-bootstrap:
    image: docker.io/hashicorp/vault:1.20
    container_name: vault-bootstrap
    entrypoint: ["/bin/sh", "/vault/bootstrap.sh"]
    environment:
      VAULT_ADDR: http://vault:8200
    volumes:
      - ./src/vault/bootstrap.sh:/vault/bootstrap.sh:ro,z
      - ./.vault/dev:/vault/init:z
      - vault_creds_auth:/creds/backend-auth
      - vault_creds_friends:/creds/backend-friends
      - vault_creds_game:/creds/backend-game
      - vault_creds_matchmaking:/creds/backend-matchmaking
      - vault_creds_status:/creds/backend-status
      - vault_creds_agent_db:/creds/agent-db
      - vault_creds_agent_tools:/creds/agent-tools
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - chessguard_network
    restart: "no"

  vault-agent-db:
    image: docker.io/hashicorp/vault:1.20
    container_name: vault-agent-db
    # Bypass the image's privilege-dropping entrypoint and run as root, so the
    # agent can read the 0400/uid-1001 AppRole creds and write the rendered volume.
    entrypoint: ["vault", "agent", "-config=/vault/agent.hcl"]
    user: "root"
    volumes:
      - ./src/vault/agent-db.hcl:/vault/agent.hcl:ro,z
      - vault_creds_agent_db:/vault/creds:ro
      - pg_secrets:/vault/rendered
    depends_on:
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_network
    healthcheck:
      test: ["CMD-SHELL", "test -s /vault/rendered/db_password"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  vault-agent-tools:
    image: docker.io/hashicorp/vault:1.20
    container_name: vault-agent-tools
    # Bypass the image's privilege-dropping entrypoint and run as root, so the
    # agent can read the 0400/uid-1001 AppRole creds and write the rendered volume.
    entrypoint: ["vault", "agent", "-config=/vault/agent.hcl"]
    user: "root"
    volumes:
      - ./src/vault/agent-tools.hcl:/vault/agent.hcl:ro,z
      - vault_creds_agent_tools:/vault/creds:ro
      - tools_secrets:/vault/rendered
    depends_on:
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_network
    healthcheck:
      test: ["CMD-SHELL", "test -s /vault/rendered/pgadmin_password"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # DATABASE (PostgreSQL)
  chessguard-db:
    image: docker.io/postgres:16
    container_name: chessguard-db
    expose:
      - "5432"
    environment:
      POSTGRES_USER_FILE: /vault/secrets/db_user
      POSTGRES_DB_FILE: /vault/secrets/db_name
      POSTGRES_PASSWORD_FILE: /vault/secrets/db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - pg_secrets:/vault/secrets:ro
    depends_on:
      vault-agent-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat $$POSTGRES_USER_FILE) -d $$(cat $$POSTGRES_DB_FILE)"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - chessguard_network
    restart: unless-stopped

  # MONITORING (Prometheus + Grafana)
  monitoring-prometheus:
    image: docker.io/prom/prometheus:v2.54.1
    container_name: monitoring-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.external-url=https://localhost/monitoring/prometheus/
      - --web.route-prefix=/
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      - chessguard_network
    restart: unless-stopped

  monitoring-grafana:
    image: docker.io/grafana/grafana:11.2.2
    container_name: monitoring-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: https://localhost/monitoring/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_METRICS_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"
    depends_on:
      - monitoring-prometheus
    networks:
      - chessguard_network
    restart: unless-stopped

  monitoring-node-exporter:
    image: docker.io/prom/node-exporter:v1.8.2
    container_name: monitoring-node-exporter
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro
    expose:
      - "9100"
    networks:
      - chessguard_network
    restart: unless-stopped

  monitoring-cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: monitoring-cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    expose:
      - "8080"
    networks:
      - chessguard_network
    restart: unless-stopped

# VOLUMES
volumes:
  postgres_data:
  portainer_data:
  avatar_uploads:
  prometheus_data:
  grafana_data:
  waf_logs:
  vault_data:
  pg_secrets:
  tools_secrets:
  backups_data:
  vault_creds_auth:
  vault_creds_friends:
  vault_creds_game:
  vault_creds_matchmaking:
  vault_creds_status:
  vault_creds_agent_db:
  vault_creds_agent_tools:

# NETWORK
networks:
  chessguard_network:
    name: chessguard_network
    driver: bridge
