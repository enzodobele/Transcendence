name: chessguard_prod

services:
# NGINX GATEWAY (Le seul point d'entrée public)
  nginx:
    build:
      context: ./src/nginx
      dockerfile: Dockerfile.prod
    ports:
      # Host 443 -> container 8443 (nginx runs non-root on an unprivileged port).
      - "8443:8443"
    environment:
      # Strict blocking mode: this is the evaluated posture.
      MODSEC_RULE_ENGINE: "On"
      BLOCKING_PARANOIA: "1"
      MODSEC_AUDIT_LOG: /var/log/modsecurity/audit.log
    volumes:
      - waf_logs:/var/log/modsecurity
    depends_on:
      frontend:
        condition: service_healthy
      backend-auth:
        condition: service_healthy
      backend-matchmaking:
        condition: service_healthy
      backend-game:
        condition: service_healthy
      backend-friends:
        condition: service_healthy
      backend-status:
        condition: service_healthy
      ai:
        condition: service_healthy
      chessguard-db:
        condition: service_healthy
    networks:
      - chessguard_prod_network
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1:8443"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  # FRONTEND (Serveur d'assets statiques React)
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile.prod
    networks:
      - chessguard_prod_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  # MICROSERVICE : Auth (Port 3000)
  backend-auth:
    build:
      context: ./src/backend-auth
      dockerfile: Dockerfile.prod
    volumes:
      - avatar_uploads:/app/uploads
      - vault_creds_auth:/vault/creds:ro
    environment:
      VAULT_ADDR: http://vault:8200
      NODE_ENV: production
      PORT: 3000
    depends_on:
      chessguard-db:
        condition: service_healthy
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_prod_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  # MICROSERVICE : Matchmaking (Port 3001)
  backend-matchmaking:
    build:
      context: ./src/backend-matchmaking
      dockerfile: Dockerfile.prod
    volumes:
      - vault_creds_matchmaking:/vault/creds:ro
    environment:
      VAULT_ADDR: http://vault:8200
      NODE_ENV: production
      GAME_SERVICE_URL: http://backend-game:3002
      PORT: 3001
    depends_on:
      chessguard-db:
        condition: service_healthy
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_prod_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  # MICROSERVICE : Game (Port 3002)
  backend-game:
    build:
      context: ./src/backend-game
      dockerfile: Dockerfile.prod
    volumes:
      - vault_creds_game:/vault/creds:ro
    environment:
      VAULT_ADDR: http://vault:8200
      NODE_ENV: production
      PORT: 3002
    depends_on:
      chessguard-db:
        condition: service_healthy
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_prod_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

      # MICROSERVICE FRIENDS (Gestion des amis)
  backend-friends:
    build: ./src/backend-friends
    container_name: backend-friends
    volumes:
      - ./src/backend-friends:/app
      - /app/node_modules
      - vault_creds_friends:/vault/creds:ro
    environment:
      PORT: 3003
      VAULT_ADDR: http://vault:8200
    depends_on:
      chessguard-db:
        condition: service_healthy
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_prod_network
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  # MICROSERVICE STATUS (Health aggregator + Backup cron)
  backend-status:
    build: ./src/backend-status
    container_name: backend-status
    user: "nodejs"
    volumes:
      - ./src/backend-status:/app
      - /app/node_modules
      - backups_data:/backups
      - vault_creds_status:/vault/creds:ro
    environment:
      VAULT_ADDR: http://vault:8200
      PORT: 3004
    depends_on:
      chessguard-db:
        condition: service_healthy
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_prod_network
    command: npm run dev
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  # MICROSERVICE : IA Maison (FastAPI + PyTorch)
  ai:
    build:
      context: ./src/ai
      dockerfile: Dockerfile.prod
    networks:
      - chessguard_prod_network
    healthcheck:
      # Utilise curl (installé via le Dockerfile) pour taper le endpoint de santé
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always

  # DATABASE (PostgreSQL)
  chessguard-db:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_USER_FILE: /vault/secrets/db_user
      POSTGRES_DB_FILE: /vault/secrets/db_name
      POSTGRES_PASSWORD_FILE: /vault/secrets/db_password
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - pg_secrets:/vault/secrets:ro
    depends_on:
      vault-agent-db:
        condition: service_healthy
    networks:
      chessguard_prod_network:
        aliases:
          - chessguard-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /vault/secrets/db_user) -d $$(cat /vault/secrets/db_name)"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # VAULT (secrets management)
  vault:
    image: docker.io/hashicorp/vault:1.20
    container_name: vault
    command: ["vault", "server", "-config=/vault/config/vault.hcl"]
    environment:
      SKIP_SETCAP: "true"
      # CLI/healthcheck target inside the container (listener is TLS-disabled).
      VAULT_ADDR: http://127.0.0.1:8200
    volumes:
      - ./src/vault/vault.hcl:/vault/config/vault.hcl:ro,z
      - vault_data:/vault/file
    networks:
      - chessguard_prod_network
    healthcheck:
      # vault status exits 0 unsealed, 2 sealed: both mean "server up".
      test: ["CMD-SHELL", "vault status >/dev/null 2>&1; rc=$$?; [ $$rc -eq 0 ] || [ $$rc -eq 2 ]"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  vault-bootstrap:
    image: docker.io/hashicorp/vault:1.20
    container_name: vault-bootstrap
    entrypoint: ["/bin/sh", "/vault/bootstrap.sh"]
    environment:
      VAULT_ADDR: http://vault:8200
    volumes:
      - ./src/vault/bootstrap.sh:/vault/bootstrap.sh:ro,z
      - ./.vault/dev:/vault/init:z
      - vault_creds_auth:/creds/backend-auth
      - vault_creds_friends:/creds/backend-friends
      - vault_creds_game:/creds/backend-game
      - vault_creds_matchmaking:/creds/backend-matchmaking
      - vault_creds_status:/creds/backend-status
      - vault_creds_agent_db:/creds/agent-db
      - vault_creds_agent_tools:/creds/agent-tools
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - chessguard_prod_network
    restart: "no"

  vault-agent-db:
    image: docker.io/hashicorp/vault:1.20
    container_name: vault-agent-db
    # Bypass the image's privilege-dropping entrypoint and run as root, so the
    # agent can read the 0400/uid-1001 AppRole creds and write the rendered volume.
    entrypoint: ["vault", "agent", "-config=/vault/agent.hcl"]
    user: "root"
    volumes:
      - ./src/vault/agent-db.hcl:/vault/agent.hcl:ro,z
      - vault_creds_agent_db:/vault/creds:ro
      - pg_secrets:/vault/rendered
    depends_on:
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_prod_network
    healthcheck:
      test: ["CMD-SHELL", "test -s /vault/rendered/db_password"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

