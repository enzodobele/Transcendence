name: chessguard_prod

services:
# NGINX GATEWAY (Le seul point d'entrée public)
  nginx:
    build:
      context: ./src/nginx
      dockerfile: Dockerfile.prod
    ports:
      # Host 443 -> container 8443 (nginx runs non-root on an unprivileged port).
      - "8443:8443"
    environment:
      # Strict blocking mode: this is the evaluated posture.
      MODSEC_RULE_ENGINE: "On"
      BLOCKING_PARANOIA: "1"
      MODSEC_AUDIT_LOG: /var/log/modsecurity/audit.log
    volumes:
      - waf_logs:/var/log/modsecurity
    depends_on:
      frontend:
        condition: service_healthy
      backend-auth:
        condition: service_healthy
      backend-matchmaking:
        condition: service_healthy
      backend-game:
        condition: service_healthy
      ai:
        condition: service_healthy
      chessguard-db:
        condition: service_healthy
    networks:
      - chessguard_prod_network
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1:8443"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  # FRONTEND (Serveur d'assets statiques React)
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile.prod
    networks:
      - chessguard_prod_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  # MICROSERVICE : Auth (Port 3000)
  backend-auth:
    build:
      context: ./src/backend-auth
      dockerfile: Dockerfile.prod
    volumes:
      - avatar_uploads:/app/uploads
      - vault_creds_auth:/vault/creds:ro
    environment:
      VAULT_ADDR: http://vault:8200
      NODE_ENV: production
      PORT: 3000
    depends_on:
      chessguard-db:
        condition: service_healthy
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_prod_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  # MICROSERVICE : Matchmaking (Port 3001)
  backend-matchmaking:
    build:
      context: ./src/backend-matchmaking
      dockerfile: Dockerfile.prod
    volumes:
      - vault_creds_matchmaking:/vault/creds:ro
    environment:
      VAULT_ADDR: http://vault:8200
      NODE_ENV: production
      GAME_SERVICE_URL: http://backend-game:3002
      PORT: 3001
    depends_on:
      chessguard-db:
        condition: service_healthy
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_prod_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  # MICROSERVICE : Game (Port 3002)
  backend-game:
    build:
      context: ./src/backend-game
      dockerfile: Dockerfile.prod
    volumes:
      - vault_creds_game:/vault/creds:ro
    environment:
      VAULT_ADDR: http://vault:8200
      NODE_ENV: production
      PORT: 3002
    depends_on:
      chessguard-db:
        condition: service_healthy
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_prod_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  # MICROSERVICE : IA Maison (FastAPI + PyTorch)
  ai:
    build:
      context: ./src/ai
      dockerfile: Dockerfile.prod
    networks:
      - chessguard_prod_network
    healthcheck:
      # Utilise curl (installé via le Dockerfile) pour taper le endpoint de santé
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always

  # DATABASE (PostgreSQL)
  chessguard-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER_FILE: /vault/secrets/db_user
      POSTGRES_DB_FILE: /vault/secrets/db_name
      POSTGRES_PASSWORD_FILE: /vault/secrets/db_password
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - pg_secrets:/vault/secrets:ro
    depends_on:
      vault-agent-db:
        condition: service_healthy
    networks:
      chessguard_prod_network:
        aliases:
          - chessguard-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /vault/secrets/db_user) -d $$(cat /vault/secrets/db_name)"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # VAULT (secrets management)
  vault:
    image: hashicorp/vault:1.20
    container_name: vault
    command: ["vault", "server", "-config=/vault/config/vault.hcl"]
    environment:
      SKIP_SETCAP: "true"
      # CLI/healthcheck target inside the container (listener is TLS-disabled).
      VAULT_ADDR: http://127.0.0.1:8200
    volumes:
      - ./src/vault/vault.hcl:/vault/config/vault.hcl:ro,z
      - vault_data:/vault/file
    networks:
      - chessguard_prod_network
    healthcheck:
      # vault status exits 0 unsealed, 2 sealed: both mean "server up".
      test: ["CMD-SHELL", "vault status >/dev/null 2>&1; rc=$$?; [ $$rc -eq 0 ] || [ $$rc -eq 2 ]"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  vault-bootstrap:
    image: hashicorp/vault:1.20
    container_name: vault-bootstrap
    entrypoint: ["/bin/sh", "/vault/bootstrap.sh"]
    environment:
      VAULT_ADDR: http://vault:8200
    volumes:
      - ./src/vault/bootstrap.sh:/vault/bootstrap.sh:ro,z
      - ./.vault/prod:/vault/init:z
      - vault_creds_auth:/creds/backend-auth
      - vault_creds_game:/creds/backend-game
      - vault_creds_matchmaking:/creds/backend-matchmaking
      - vault_creds_agent_db:/creds/agent-db
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - chessguard_prod_network
    restart: "no"

  vault-agent-db:
    image: hashicorp/vault:1.20
    container_name: vault-agent-db
    # Bypass the image's privilege-dropping entrypoint and run as root, so the
    # agent can read the 0400/uid-1001 AppRole creds and write the rendered volume.
    entrypoint: ["vault", "agent", "-config=/vault/agent.hcl"]
    user: "root"
    volumes:
      - ./src/vault/agent-db.hcl:/vault/agent.hcl:ro,z
      - vault_creds_agent_db:/vault/creds:ro
      - pg_secrets:/vault/rendered
    depends_on:
      vault-bootstrap:
        condition: service_completed_successfully
    networks:
      - chessguard_prod_network
    healthcheck:
      test: ["CMD-SHELL", "test -s /vault/rendered/db_password"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # MONITORING (Prometheus + Grafana)
  monitoring-prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.external-url=https://localhost/monitoring/prometheus/
      - --web.route-prefix=/
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_prod_data:/prometheus
    expose:
      - "9090"
    networks:
      - chessguard_prod_network
    restart: always

  monitoring-grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: https://localhost/monitoring/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"
    depends_on:
      - monitoring-prometheus
    networks:
      - chessguard_prod_network
    restart: always

  monitoring-node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro
    expose:
      - "9100"
    networks:
      - chessguard_prod_network
    restart: always

  monitoring-cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    expose:
      - "8080"
    networks:
      - chessguard_prod_network
    restart: always

# VOLUMES PERSISTANTS
volumes:
  postgres_prod_data:
    name: chessguard_prod_db_data
  avatar_uploads:
    name: chessguard_prod_avatar_uploads
  prometheus_prod_data:
    name: chessguard_prod_prometheus_data
  grafana_prod_data:
    name: chessguard_prod_grafana_data
  waf_logs:
  vault_data:
  pg_secrets:
  vault_creds_auth:
  vault_creds_game:
  vault_creds_matchmaking:
  vault_creds_agent_db:

# RÉSEAUX ISOLÉS
networks:
  chessguard_prod_network:
    name: chessguard_prod_network
    driver: bridge